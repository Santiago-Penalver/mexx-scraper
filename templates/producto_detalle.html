<!-- Cabecera -->
<div class="flex justify-between items-start mb-4">
    <span class="text-xs font-bold uppercase tracking-widest px-2.5 py-1 rounded-md border {% if prod.marca == 'AMD' %}bg-orange-500/10 text-orange-400 border-orange-500/30{% else %}bg-blue-500/10 text-blue-400 border-blue-500/30{% endif %}">
        {{ prod.marca }}
    </span>
    <span class="text-xs text-gray-500 font-mono">ID: #{{ prod.id }}</span>
</div>

<h3 class="text-lg font-bold text-white mb-2">{{ prod.nombre }}</h3>

<div class="mb-6">
    <p class="text-xs text-gray-400">Precio Monitoreado</p>
    <p class="text-3xl font-black text-emerald-400">${{ "{:,.2f}".format(prod.precio).replace(',', 'X').replace('.', ',').replace('X', '.') }}</p>
</div>

<!-- Detalles Técnicos / Tracking -->
<div class="space-y-3 mb-8">
    <div class="flex justify-between text-xs border-b border-gray-700/50 pb-2">
        <span class="text-gray-400">Estado de Stock:</span>
        <span class="text-emerald-400 font-bold flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> En Vivo
        </span>
    </div>
    <div class="flex justify-between text-xs border-b border-gray-700/50 pb-2">
        <span class="text-gray-400">Última captura:</span>
        <span class="text-gray-300 font-mono">{{ prod.fecha }} hs</span>
    </div>
    <div class="flex justify-between text-xs">
        <span class="text-gray-400">Origen de grilla:</span>
        <span class="text-indigo-400 font-medium">Mexx Hardware</span>
    </div>
</div>

<!-- BOTÓN DE CERRAR HTMX -->
<button hx-target="#panel-contenido-detalle" 
    hx-get="/vaciar" 
    hx-swap="innerHTML"
    class="w-full py-2.5 bg-gray-700/80 hover:bg-gray-600 text-gray-200 hover:text-white rounded-xl text-xs font-bold transition-all border border-gray-600/50 flex items-center justify-center gap-2 cursor-pointer">
    <i class="fa-solid fa-xmark"></i> Cerrar Vista Individual
</button>
