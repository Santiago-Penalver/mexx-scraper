<div class="bg-gray-800/90 backdrop-blur-md rounded-2xl p-6 border {% if prod.marca == 'AMD' %}border-orange-500/30 bg-gradient-to-b from-gray-800/90 to-orange-950/10{% else %}border-blue-500/30 bg-gradient-to-b from-gray-800/90 to-blue-950/10{% endif %} shadow-2xl sticky top-8 animate-fade-in">
    <!-- Cabecera -->
    <div class="flex justify-between items-center mb-6">
        <span class="text-xs font-bold uppercase tracking-widest px-2.5 py-1 rounded-md border {% if prod.marca == 'AMD' %}bg-orange-500/10 text-orange-400 border-orange-500/30{% else %}bg-blue-500/10 text-blue-400 border-blue-500/30{% endif %} flex items-center gap-1.5">
            <i class="fa-solid {% if prod.marca == 'AMD' %}fa-fire-flame-curved{% else %}fa-bolt{% endif %}"></i>
            {{ prod.marca }}
        </span>
        <span class="text-xs text-gray-500 font-mono">ID: #{{ prod.id }}</span>
    </div>

    <!-- Título Grande -->
    <h3 class="text-xl font-extrabold text-white leading-snug mb-6">
        {{ prod.nombre }}
    </h3>

    <!-- Info de Precio Comercial -->
    <div class="bg-gray-900/50 rounded-xl p-4 border border-gray-700/40 mb-6">
        <p class="text-xs text-gray-400 mb-1 font-medium uppercase tracking-wider">Precio Monitoreado</p>
        <p class="text-3xl font-black text-white">
            ${{ "{:,.2f}".format(prod.precio).replace(',', 'X').replace('.', ',').replace('X', '.') }}
        </p>
    </div>

    <!-- Detalles Técnicos Simulados / Tracking -->
    <div class="space-y-3 mb-8">
        <div class="flex justify-between text-xs border-b border-gray-700/50 pb-2">
            <span class="text-gray-400">Estado de Stock:</span>
            <span class="text-emerald-400 font-bold flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> En Vivo
            </span>
        </div>
        <div class="flex justify-between text-xs border-b border-gray-700/50 pb-2">
            <span class="text-gray-400">Última captura:</span>
            <span class="text-gray-300 font-mono">{{ prod.fecha }} hs</span>
        </div>
        <div class="flex justify-between text-xs">
            <span class="text-gray-400">Origen de grilla:</span>
            <span class="text-indigo-400 font-medium">Mexx Hardware</span>
        </div>
    </div>

    <!-- Acciones -->
    <button onclick="document.getElementById('columna-detalle').classList.add('hidden')" class="w-full py-2.5 bg-gray-700 hover:bg-gray-600 text-gray-200 hover:text-white rounded-xl text-xs font-bold transition-all border border-gray-600/50 flex items-center justify-center gap-2">
        <i class="fa-solid fa-xmark"></i> Cerrar Vista Individual
    </button>
</div>
